# Village Radio — example config
# Copy this file somewhere outside the repo and customize it.
# e.g., ~/music/radio-config.yaml

playlist:
  spotify_uri: "spotify:playlist:YOUR_PLAYLIST_ID"
  name: "Village Radio"

settings:
  # How far back to look for new releases (days)
  lookback_days: 14
  # Maximum tracks in the playlist
  max_tracks: 50
  # How many favorites to sprinkle in each week
  favorites_count: 5
  # Which release types to include
  include_groups:
    - album
    - single
    - appears_on
  # Delay between Spotify API calls (seconds) — be kind to the API
  rate_limit_delay: 0.5

# Artists in your community
artists:
  - name: "Bartees Strange"
    spotify_uri: "spotify:artist:abc123"
  - name: "Squirrel Flower"
    spotify_uri: "spotify:artist:def456"

# Tracks pinned to the top — these never get rotated out
pinned:
  - name: "My Latest Single"
    spotify_uri: "spotify:track:xyz789"
    artist: "Your Name"

# All-time favorites to sprinkle through the playlist
favorites:
  - name: "Motion Sickness"
    spotify_uri: "spotify:track:aaa111"
    artist: "Phoebe Bridgers"
  - name: "Wetsuit"
    spotify_uri: "spotify:track:bbb222"
    artist: "The Vaccines"
